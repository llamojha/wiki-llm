# Only for clusters WITHOUT IAM-role integration (no IRSA / Pod Identity).
# Prefer roles over static keys wherever possible.
#
#   kubectl create secret generic vaultmark-aws \
#     --namespace vaultmark \
#     --from-literal=AWS_ACCESS_KEY_ID=... \
#     --from-literal=AWS_SECRET_ACCESS_KEY=...
#
# Never commit a real version of this file.
apiVersion: v1
kind: Secret
metadata:
  name: vaultmark-aws
  namespace: vaultmark
type: Opaque
stringData:
  AWS_ACCESS_KEY_ID: "REPLACE_ME"
  AWS_SECRET_ACCESS_KEY: "REPLACE_ME"
