apiVersion: apps/v1
kind: Deployment
metadata:
  name: vaultmark
  namespace: vaultmark
  labels:
    app: vaultmark
spec:
  replicas: 2
  selector:
    matchLabels:
      app: vaultmark
  template:
    metadata:
      labels:
        app: vaultmark
    spec:
      serviceAccountName: vaultmark
      containers:
        - name: web
          # Push the image built from web/Dockerfile to your registry
          image: <registry>/vaultmark:latest
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - configMapRef:
                name: vaultmark-config
            # Uncomment when using static keys instead of IRSA:
            # - secretRef:
            #     name: vaultmark-aws
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /api/vaults
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/vaults
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            runAsUser: 1000
