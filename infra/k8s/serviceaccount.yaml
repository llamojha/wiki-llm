apiVersion: v1
kind: ServiceAccount
metadata:
  name: vaultmark
  namespace: vaultmark
  # EKS + IRSA: annotate with the IAM role that grants S3/Bedrock access
  # (see docs/deploy/kubernetes.md). Remove the annotation on non-EKS
  # clusters and provide credentials via a Secret instead.
  annotations:
    eks.amazonaws.com/role-arn: "arn:aws:iam::<account-id>:role/vaultmark-portal"
