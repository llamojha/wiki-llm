services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: vaultmark
      POSTGRES_PASSWORD: vaultmark
      POSTGRES_DB: vaultmark
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vaultmark"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: ../web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file: .env

volumes:
  pg_data:
