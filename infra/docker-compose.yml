services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: vaultmark
      POSTGRES_PASSWORD: vaultmark
      POSTGRES_DB: vaultmark
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vaultmark"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ../api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://vaultmark:vaultmark@db:5432/vaultmark
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ../web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - api

volumes:
  pg_data:
