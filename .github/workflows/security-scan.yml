name: Security scan

# Weekly sweep that catches CVEs published *after* an image was built:
#   1. repo lockfiles (npm/pnpm + uv) — vulnerable dependencies
#   2. IaC misconfigurations — Dockerfiles, k8s manifests, compose
#   3. the published :latest image on GHCR — OS packages + bundled node_modules
#
# A red run is the alert. PR-time scanning of the freshly built image lives in
# release-image.yml; Dependabot handles the fix PRs.

on:
  schedule:
    - cron: '30 5 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  packages: read

jobs:
  dependencies:
    name: lockfile vulnerabilities
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '1'

  config:
    name: IaC misconfigurations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Trivy config scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: '1'

  image:
    name: published image vulnerabilities
    runs-on: ubuntu-latest
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Trivy image scan (latest)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/${{ github.repository }}:latest
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '1'
