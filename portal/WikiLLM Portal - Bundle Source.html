<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>WikiLLM — Knowledge Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Serif:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>
  <template id="__bundler_thumbnail" data-bg-color="#181b22">
    <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
      <!-- Soft glow behind mark -->
      <defs>
        <radialGradient id="glow" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#8a86f3" stop-opacity="0.35"/>
          <stop offset="100%" stop-color="#8a86f3" stop-opacity="0"/>
        </radialGradient>
      </defs>
      <circle cx="600" cy="400" r="280" fill="url(#glow)"/>

      <!-- Brand mark: rounded square with 'w' glyph, mirroring the topbar mark -->
      <g transform="translate(440 240)">
        <rect width="320" height="320" rx="68" fill="#6c63f3"/>
        <rect width="320" height="320" rx="68" fill="none" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>
        <text x="160" y="218" text-anchor="middle"
              font-family="ui-monospace, Menlo, monospace" font-weight="700" font-size="192"
              letter-spacing="-12" fill="#ffffff">w</text>
      </g>

      <!-- Wordmark -->
      <text x="600" y="640" text-anchor="middle"
            font-family="ui-sans-serif, system-ui, -apple-system, sans-serif"
            font-size="44" font-weight="600" letter-spacing="-0.5"
            fill="#f1f1f6">WikiLLM</text>
      <text x="600" y="690" text-anchor="middle"
            font-family="ui-monospace, Menlo, monospace"
            font-size="22" letter-spacing="2"
            fill="#7a7c87">KNOWLEDGE PORTAL</text>
    </svg>
  </template>

  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="data.jsx"></script>
  <script type="text/babel" src="doc-bodies.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
  <script type="text/babel" src="chat.jsx"></script>
  <script type="text/babel" src="upload.jsx"></script>
  <script type="text/babel">
    // Re-export app components to globals so main.jsx can use them
    window.Sidebar = window.WIKI_APP.Sidebar;
    window.TopBar = window.WIKI_APP.TopBar;
    window.DocReader = window.WIKI_APP.DocReader;
    window.SearchPalette = window.WIKI_APP.SearchPalette;
    window.Editor = window.WIKI_APP.Editor;
  </script>
  <script type="text/babel" src="main.jsx"></script>
</body>
</html>
